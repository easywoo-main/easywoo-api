services:
  pg_db:
    image: postgres:latest
    hostname: pg_db
    ports:
      - ${DATABASE_PORT}:5432
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    env_file:
      - ../.env
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - backend

  adminer:
    image: adminer:latest
    hostname: adminer
    ports:
      - 8088:8080
    networks:
      - backend
    depends_on:
      - pg_db

networks:
  backend:

volumes:
  pg_data:
